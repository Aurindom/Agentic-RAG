apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-rag
  template:
    metadata:
      labels:
        app: agentic-rag
    spec:
      containers:
        - name: agentic-rag
          image: agentic-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: anthropic-key
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: tavily-key